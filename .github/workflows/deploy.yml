name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: decision-studio-ui/package-lock.json

      - name: Install dependencies
        working-directory: decision-studio-ui
        run: npm ci

      - name: Build
        working-directory: decision-studio-ui
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: c0400d9d1b283c479b717b354f495e0f
          projectName: agent9hermes
          directory: decision-studio-ui/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
