    version, currency, account_name, account_type, account_category, account_group,
    product_name, product_line, product_category, customer_name, customer_segment,
    customer_region, profit_center_name, business_unit, channel_name, channel_type
    FROM LubricantsStarSchemaView
  source_table: LubricantsStarSchemaView
- name: temp_discovery_Products_view
