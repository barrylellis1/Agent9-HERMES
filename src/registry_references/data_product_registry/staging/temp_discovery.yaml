views:
- name: temp_discovery_Channels_view
  sql: SELECT channel_id, channel_name, channel_type FROM Channels
  source_table: Channels
- name: temp_discovery_Customers_view
  sql: SELECT customer_id, customer_name, customer_segment, customer_region FROM Customers
  source_table: Customers
- name: temp_discovery_FinancialTransactions_view
  sql: SELECT transaction_id, fiscal_year, fiscal_period, transaction_date, gl_account_id,
    product_id, customer_id, profit_center_id, channel_id, amount, version, currency
    FROM FinancialTransactions
  source_table: FinancialTransactions
- name: temp_discovery_GLAccounts_view
