<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decision Studio | AI Decision Intelligence</title>
    <meta name="description" content="Transform your KPI data into actionable insights with AI Decision Intelligence. Decision Studio automates root cause analysis, market context, and value assurance." />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Decision Studio | AI Decision Intelligence" />
    <meta property="og:description" content="Transform your KPI data into actionable insights with AI Decision Intelligence." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" />

    <!-- Prevent Google from indexing the app/demo domain -->
    <script>
      if (!window.location.hostname.includes('decision-studios.com') && window.location.hostname !== 'localhost') {
        var meta = document.createElement('meta');
        meta.name = "robots";
        meta.content = "noindex, nofollow";
        document.head.appendChild(meta);
      }
    </script>
  </head>
  <body class="bg-slate-950 text-slate-50 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
